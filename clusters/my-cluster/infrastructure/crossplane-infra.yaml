apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-infra
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/my-cluster/infrastructure/crossplane-infra
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

  dependsOn:
    - name: crossplane

  wait: true
  timeout: 5m
