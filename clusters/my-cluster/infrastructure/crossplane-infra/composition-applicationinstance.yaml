apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: applicationinstance-direct-kubernetes
spec:
  compositeTypeRef:
    apiVersion: platform.example.org/v1alpha1
    kind: ApplicationInstance

  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $tenant := $xr.spec.tenantId }}
            {{- $host := $xr.spec.host }}
            {{- $dbStorageSize := $xr.spec.dbStorageSize }}
            {{- $dbInstances := $xr.spec.dbInstances }}
            {{- $backendReplicas := $xr.spec.backendReplicas }}
            {{- $backendImage := $xr.spec.backendImage }}
            {{- $backendPort := $xr.spec.backendPort }}
            {{- $frontendReplicas := $xr.spec.frontendReplicas }}
            {{- $frontendImage := $xr.spec.frontendImage }}
            {{- $frontendPort := $xr.spec.frontendPort }}
            {{- $clusterIssuer := $xr.spec.clusterIssuer }}

            ---
            apiVersion: v1
            kind: Namespace
            metadata:
              name: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: namespace
                gotemplating.fn.crossplane.io/ready: "True"
              labels:
                app.kubernetes.io/managed-by: crossplane
                platform.example.org/tenant: {{ $tenant }}
            ---
            apiVersion: v1
            kind: ResourceQuota
            metadata:
              name: tenant-quota
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: resource-quota
            spec:
              hard:
                requests.cpu: "750m"
                requests.memory: "1Gi"
                limits.cpu: "1500m"
                limits.memory: "2Gi"
                pods: "8"
                services: "8"
                secrets: "20"
                configmaps: "20"
                persistentvolumeclaims: "2"
                requests.storage: "10Gi"
            ---
            apiVersion: v1
            kind: LimitRange
            metadata:
              name: tenant-limits
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: limit-range
            spec:
              limits:
                - type: Container
                  defaultRequest:
                    cpu: "50m"
                    memory: "64Mi"
                  default:
                    cpu: "250m"
                    memory: "256Mi"
                  max:
                    cpu: "500m"
                    memory: "1Gi"
            ---
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: app-db
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: postgres-cluster
            spec:
              instances: {{ $dbInstances }}
              bootstrap:
                initdb:
                  database: app
                  owner: app
              storage:
                size: {{ $dbStorageSize }}
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: backend
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: backend-deployment
              labels:
                app.kubernetes.io/name: backend
                app.kubernetes.io/part-of: tenant-app
                platform.example.org/tenant: {{ $tenant }}
            spec:
              replicas: {{ $backendReplicas }}
              selector:
                matchLabels:
                  app.kubernetes.io/name: backend
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: backend
                    app.kubernetes.io/part-of: tenant-app
                    platform.example.org/tenant: {{ $tenant }}
                spec:
                  containers:
                    - name: backend
                      image: {{ $backendImage }}
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: http
                          containerPort: {{ $backendPort }}
                      env:
                        - name: PORT
                          value: {{ printf "%v" $backendPort | quote }}
                        - name: DATABASE_URL
                          valueFrom:
                            secretKeyRef:
                              name: app-db-app
                              key: uri
                        - name: CORS_ORIGIN
                          value: {{ printf "https://%s" $host | quote }}
                      readinessProbe:
                        httpGet:
                          path: /health
                          port: {{ $backendPort }}
                        initialDelaySeconds: 10
                        periodSeconds: 10
                        failureThreshold: 6
                      livenessProbe:
                        httpGet:
                          path: /health
                          port: {{ $backendPort }}
                        initialDelaySeconds: 30
                        periodSeconds: 20
                      resources:
                        requests:
                          cpu: 100m
                          memory: 128Mi
                        limits:
                          cpu: 500m
                          memory: 512Mi
            ---
            apiVersion: cloud.google.com/v1
            kind: BackendConfig
            metadata:
              name: backend-config
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: backend-backendconfig
              labels:
                app.kubernetes.io/name: backend
                app.kubernetes.io/part-of: tenant-app
                platform.example.org/tenant: {{ $tenant }}
            spec:
              healthCheck:
                type: HTTP
                requestPath: /health
                port: {{ $backendPort }}
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: backend
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: backend-service
                cloud.google.com/neg: '{"ingress":true}'
                cloud.google.com/backend-config: '{"default": "backend-config"}'
              labels:
                app.kubernetes.io/name: backend
                app.kubernetes.io/part-of: tenant-app
            spec:
              type: ClusterIP
              selector:
                app.kubernetes.io/name: backend
              ports:
                - name: http
                  port: 80
                  targetPort: http
            ---
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: ghcr-pull-secret
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ghcr-pull-secret
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: gcp-secret-manager
                kind: ClusterSecretStore
              target:
                name: ghcr-pull-secret
                creationPolicy: Owner
                template:
                  type: kubernetes.io/dockerconfigjson
              data:
                - secretKey: .dockerconfigjson
                  remoteRef:
                    key: ghcr-dockerconfigjson
            ---
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: frontend
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend-deployment
              labels:
                app.kubernetes.io/name: frontend
                app.kubernetes.io/part-of: tenant-app
                platform.example.org/tenant: {{ $tenant }}
            spec:
              replicas: {{ $frontendReplicas }}
              selector:
                matchLabels:
                  app.kubernetes.io/name: frontend
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: frontend
                    app.kubernetes.io/part-of: tenant-app
                    platform.example.org/tenant: {{ $tenant }}
                spec:
                  imagePullSecrets:
                    - name: ghcr-pull-secret
                  containers:
                    - name: frontend
                      image: {{ $frontendImage }}
                      imagePullPolicy: IfNotPresent
                      ports:
                        - name: http
                          containerPort: {{ $frontendPort }}
                      readinessProbe:
                        httpGet:
                          path: /
                          port: http
                        initialDelaySeconds: 5
                        periodSeconds: 10
                      livenessProbe:
                        httpGet:
                          path: /
                          port: http
                        initialDelaySeconds: 20
                        periodSeconds: 20
                      resources:
                        requests:
                          cpu: 50m
                          memory: 64Mi
                        limits:
                          cpu: 250m
                          memory: 256Mi

            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: frontend
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: frontend-service
              labels:
                app.kubernetes.io/name: frontend
                app.kubernetes.io/part-of: tenant-app
            spec:
              type: ClusterIP
              selector:
                app.kubernetes.io/name: frontend
              ports:
                - name: http
                  port: 80
                  targetPort: http
            ---
            apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: app
              namespace: {{ $tenant }}
              annotations:
                kubernetes.io/ingress.class: gce
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
                cert-manager.io/cluster-issuer: {{ $clusterIssuer }}
                external-dns.alpha.kubernetes.io/hostname: {{ $host }}
              labels:
                app.kubernetes.io/part-of: tenant-app
                platform.example.org/tenant: {{ $tenant }}
            spec:
              tls:
                - hosts:
                    - {{ $host }}
                  secretName: app-tls
              rules:
                - host: {{ $host }}
                  http:
                    paths:
                      - path: /
                        pathType: Prefix
                        backend:
                          service:
                            name: frontend
                            port:
                              number: 80
                      - path: /api
                        pathType: Prefix
                        backend:
                          service:
                            name: backend
                            port:
                              number: 80
            ---
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-backend-to-postgres
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: networkpolicy-allow-backend-postgres
            spec:
              podSelector:
                matchLabels:
                  cnpg.io/cluster: app-db
              policyTypes:
                - Ingress
              ingress:
                - from:
                    - podSelector:
                        matchLabels:
                          app.kubernetes.io/name: backend
                  ports:
                    - protocol: TCP
                      port: 5432
            ---
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: default-deny-ingress
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: networkpolicy-default-deny-ingress
            spec:
              podSelector: {}
              policyTypes:
                - Ingress
            ---
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-gclb-to-frontend
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: networkpolicy-allow-gclb-to-frontend
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: frontend
              policyTypes:
                - Ingress
              ingress:
                - from:
                    - ipBlock:
                        cidr: 35.191.0.0/16
                    - ipBlock:
                        cidr: 130.211.0.0/22
                  ports:
                    - protocol: TCP
                      port: {{ $frontendPort }}
            ---
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-gclb-to-backend
              namespace: {{ $tenant }}
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: networkpolicy-allow-gclb-to-backend
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/name: backend
              policyTypes:
                - Ingress
              ingress:
                - from:
                    - ipBlock:
                        cidr: 35.191.0.0/16
                    - ipBlock:
                        cidr: 130.211.0.0/22
                  ports:
                    - protocol: TCP
                      port: {{ $backendPort }}
